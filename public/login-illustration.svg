<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" width="600" height="500">
  <!-- Curved path/arrow -->
  <path d="M485,110 Q420,170 500,230" stroke="#00A2FF" stroke-width="3" stroke-dasharray="5,5" fill="none" />
  <!-- Arrow tip -->
  <polygon points="485,110 480,125 495,122" fill="#00A2FF" />

  <!-- Phone/Device -->
  <rect x="480" y="170" width="80" height="150" rx="10" ry="10" fill="#00A2FF" />
  <rect x="485" y="180" width="70" height="120" rx="5" ry="5" fill="white" />
  <!-- Profile icon -->
  <circle cx="520" cy="200" r="15" fill="#00A2FF" />
  <circle cx="520" cy="195" r="6" fill="white" />
  <path d="M510,210 Q520,220 530,210" fill="white" />
  
  <!-- Login fields on device screen -->
  <rect x="495" y="230" width="50" height="8" rx="4" ry="4" fill="#00A2FF" opacity="0.7" />
  <rect x="495" y="245" width="50" height="8" rx="4" ry="4" fill="#00A2FF" opacity="0.7" />
  
  <!-- Connection points/dots -->
  <circle cx="580" cy="200" r="20" fill="#f0f0f0" opacity="0.5" />
  <circle cx="610" cy="250" r="15" fill="#f0f0f0" opacity="0.4" />
  <circle cx="590" cy="300" r="25" fill="#f0f0f0" opacity="0.3" />

  <!-- Woman figure -->
  <g transform="translate(430, 280)">
    <!-- Body -->
    <path d="M0,0 C10,10 20,15 30,0 L25,80 L5,80 Z" fill="#1FAB89" />
    <!-- Head -->
    <ellipse cx="15" cy="-15" rx="15" ry="20" fill="#333" />
    <!-- Hair -->
    <path d="M0,-15 C-5,-30 35,-30 30,-15 C35,-5 35,0 25,0 L5,-5 Z" fill="#333" />
    <!-- Arm -->
    <path d="M0,20 C-20,30 -30,50 -40,40" stroke="#1FAB89" stroke-width="8" fill="none" />
    <!-- Hand -->
    <circle cx="-40" cy="40" r="5" fill="#FFD3B6" />
  </g>

  <!-- Person sitting -->
  <g transform="translate(560, 350)">
    <!-- Body -->
    <rect x="-30" y="-30" width="25" height="30" rx="5" ry="5" fill="#4EDB98" />
    <!-- Head -->
    <circle cx="-20" cy="-45" r="12" fill="#FFD3B6" />
    <!-- Legs crossed -->
    <path d="M-30,0 C-50,10 -10,20 -10,0" fill="#4EDB98" />
    <!-- Arms -->
    <path d="M-10,-20 C0,-10 10,-20 0,-30" stroke="#4EDB98" stroke-width="6" fill="none" />
    <!-- Item (laptop) -->
    <rect x="-40" y="-15" width="30" height="20" rx="2" ry="2" fill="#ddd" />
  </g>

  <!-- Plant decoration -->
  <g transform="translate(590, 340)">
    <rect x="0" y="0" width="20" height="20" rx="2" ry="2" fill="#eee" />
    <path d="M10,-10 C0,-20 20,-20 10,-10" stroke="#4EDB98" stroke-width="2" fill="none" />
    <path d="M10,-10 C0,-30 20,-30 10,-10" stroke="#4EDB98" stroke-width="2" fill="none" />
    <path d="M10,-10 C-5,-25 25,-25 10,-10" stroke="#4EDB98" stroke-width="2" fill="none" />
  </g>
</svg> 